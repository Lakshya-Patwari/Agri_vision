<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation</title>
</head>

<body>

<h2>Crop Recommendation System</h2>

<form action="/predict" method="POST">

    <label>Nitrogen:</label>
    <input type="number" name="nitrogen" required><br><br>

    <label>Phosphorous:</label>
    <input type="number" name="phosphorous" required><br><br>

    <label>Potassium:</label>
    <input type="number" name="potassium" required><br><br>

    <label>City:</label>
    <input type="text" name="city" placeholder="Enter city (e.g. Delhi)" required><br><br>

    <label>pH:</label>
    <input type="number" step="any" name="ph" required><br><br>

    <label>Rainfall (mm):</label>
    <input type="number" step="any" name="rainfall" required><br><br>

    <button type="submit">Predict Crop</button>

</form>

</body>
</html>
