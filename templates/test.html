<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>
<div style="height: 350px; width: 100%;">
<canvas id="myChart"></canvas>
</div>
<script>
const ctx = document.getElementById('myChart').getContext('2d');
new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Jan', 'Feb'],
        datasets: [{
            label: 'Test',
            data: [10, 20],
            borderColor: '#2e7d32',
            fill: true
        }]
    }
});
</script>
</body>
</html>
